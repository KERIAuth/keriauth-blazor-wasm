<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIGN</title>
    <base href="/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo016.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo032.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="images/logo096.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo180.png" />
    <link href="content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/site.css" rel="stylesheet" />
    <!-- Apply theme background before first paint (colors synced with AppConfig.cs) -->
    <script src="scripts/es6/splashTheme.js"></script>
    <!-- Auto-detects extension context (TAB/POPUP/SIDEPANEL) from ?context= query parameter -->
    <script type="module" src="scripts/es6/setExtContext.js"></script>
</head>

<body style="min-width:420px; width:100vw; min-height:600px; height:100vh; margin:0; padding:0; box-sizing:border-box; overflow-y:hidden; display:flex; align-items:center; justify-content:center; background-color: var(--splash-bg, #f5f5f5);">
    <div id="app" style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; position:relative;">
        <img class="splash-fade-in" style="display:block; width:180px; height:180px;" src="images/logo180.png" alt="logo" />
        <span class="splash-fade-in" style="position:absolute; top:calc(50% + 105px); left:0; right:0; text-align:center; font-family: 'Segoe UI', sans-serif; font-size: 2.5rem; font-variant: small-caps; font-weight: 700; color: var(--splash-fg, #212121);">DIGN</span>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="framework/blazor.webassembly.js"></script>
    <script src="content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
